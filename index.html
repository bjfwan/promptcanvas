<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121413" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="PromptCanvas 是一个 editorial 风格的 AI 图像创作工作台 — 本地优先、键盘友好、移动端原生体验。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>PromptCanvas — image studio</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23f4f0e7'/><text x='50' y='70' text-anchor='middle' font-family='Georgia, serif' font-size='60' font-weight='600' font-style='italic' fill='%23191b18'>P</text></svg>"
    />
    <meta property="og:title" content="PromptCanvas — image studio" />
    <meta
      property="og:description"
      content="editorial 风格的 AI 图像工作台 — 三栏排版、移动端 chat-dock、键盘命令面板、Lightbox 全屏预览。"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <style>
      html { background: #f4f0e7; }
      html.theme-night { background: #121413; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme]) { background: #121413; }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('promptcanvas:theme-v1');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'paper' || stored === 'night' ? stored : prefersDark ? 'night' : 'paper';
          if (theme === 'night') {
            document.documentElement.classList.add('theme-night');
          }
          document.documentElement.dataset.theme = theme;
        } catch (e) {
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
