<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f0e9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1012" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="PromptCanvas 是一个 Atelier Ledger 风格的 AI 图像创作工作台，本地优先、质感克制、面向真实创作流程。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>PromptCanvas — image studio</title>
    <link rel="icon" type="image/png" sizes="64x64" href="/brand/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/brand/promptcanvas-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta property="og:title" content="PromptCanvas — image studio" />
    <meta
      property="og:description"
      content="Atelier Ledger 风格的 AI 图像工作台 — 三栏制版台、移动端创作 dock、历史图像本地缓存、Lightbox 全屏预览。"
    />
    <meta property="og:image" content="/brand/promptcanvas-icon.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <style>
      html { background: #f2f0e9; }
      html.theme-night { background: #0f1012; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme]) { background: #0f1012; }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('promptcanvas:theme-v1');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'paper' || stored === 'night' ? stored : prefersDark ? 'night' : 'paper';
          if (theme === 'night') {
            document.documentElement.classList.add('theme-night');
          }
          document.documentElement.dataset.theme = theme;
        } catch (e) {
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
